            e.preventDefault();
            const record = {
                name: document.getElementById('leaveEmployee').value,
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                days: parseFloat(document.getElementById('leaveDays').value),
                phone: document.getElementById('leavePhone').value.trim(),
                reason: document.getElementById('leaveReason').value.trim(),
                month: new Date(document.getElementById('startDate').value).getMonth() + 1
            };
