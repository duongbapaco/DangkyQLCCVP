<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Công Phép Văn Phòng - VINAPACO 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, select, input, textarea, button, table { font-family: "Times New Roman", Times, serif !important; font-size: 14pt !important; }
        h1 { font-size: 22pt !important; }
        h2 { font-size: 18pt !important; }
        label { font-weight: bold; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen pb-12">

    <nav class="bg-blue-950 text-white p-4">
        <div class="max-w-7xl mx-auto text-center">
            <h1 class="font-bold uppercase">Hệ Thống Quản Lý Phép Văn Phòng - VINAPACO 2026</h1>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 mt-6">
        <div class="bg-white p-6 rounded-xl shadow-md">
            <h3 class="font-bold text-blue-900 border-b pb-3 mb-5">Đăng Ký Nghỉ Phép</h3>
            <form id="leaveForm" onsubmit="submitToGoogle(event)" class="space-y-4">
                <div>
                    <label>Họ và tên:</label>
                    <input type="text" id="fullName" class="w-full border p-2 rounded" required placeholder="Nhập họ tên...">
                </div>
                <div>
                    <label>Tháng nghỉ (Số):</label>
                    <input type="number" id="leaveMonth" class="w-full border p-2 rounded" required placeholder="Ví dụ: 7">
                </div>
                <div>
                    <label>Số ngày nghỉ:</label>
                    <input type="number" id="leaveDays" step="0.5" class="w-full border p-2 rounded" required>
                </div>
                <div>
                    <label>Lý do:</label>
                    <textarea id="reason" class="w-full border p-2 rounded" required></textarea>
                </div>
                <button type="submit" class="w-full bg-blue-800 text-white py-3 rounded font-bold hover:bg-blue-900">
                    <i class="fa-solid fa-paper-plane mr-2"></i> Gửi Đơn Nghỉ Phép
                </button>
            </form>
        </div>
    </div>

    <script>
        async function submitToGoogle(e) {
            e.preventDefault();
            
            const data = {
                fullName: document.getElementById('fullName').value,
                department: "Văn Phòng",
                leaveMonth: document.getElementById('leaveMonth').value,
                leaveDays: document.getElementById('leaveDays').value,
                reason: document.getElementById('reason').value
            };

            const URL = "https://script.google.com/macros/s/AKfycbzwHDkGkHfrXI2z2T3RE-Snr7yld0VS9QIjX8LtEArEYg-XfJiZgRPJt2RtbpRvsuBaaA/exec";

            alert("Đang gửi đơn, vui lòng đợi...");

            try {
                await fetch(URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                
                alert("Gửi đơn thành công! Dữ liệu đã lưu vào Google Sheets.");
                document.getElementById('leaveForm').reset();
            } catch (error) {
                alert("Lỗi kết nối: " + error);
            }
        }
    </script>
</body>
</html>
