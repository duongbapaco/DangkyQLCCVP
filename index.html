<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Phép VINAPACO 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: "Times New Roman", Times, serif !important; font-size: 14pt !important; }
    </style>
</head>
<body class="bg-slate-100 p-8">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow">
        <h1 class="text-2xl font-bold mb-4">Đăng Ký Nghỉ Phép</h1>
        <form id="leaveForm" class="space-y-4">
            <input type="text" id="name" placeholder="Họ và tên" class="w-full border p-2 rounded" required>
            <input type="date" id="start" class="w-full border p-2 rounded" required>
            <input type="date" id="end" class="w-full border p-2 rounded" required>
            <input type="text" id="phone" placeholder="Số điện thoại" class="w-full border p-2 rounded" required>
            <button type="submit" class="w-full bg-blue-800 text-white p-3 rounded font-bold">Gửi yêu cầu</button>
        </form>
    </div>

    <script>
        // --- ĐIỀN THÔNG TIN VÀO ĐÂY ---
        const SUPABASE_URL = "https://xfmmfoidlqnhbdjpzqoe.supabase.co"; // Thay bằng Project URL của bạn
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhmbW1mb2lkbHFuaGJkanB6cW9lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5OTI0NTAsImV4cCI6MjA5ODU2ODQ1MH0.jFah4ZYlmkM2mBsVaiKECTd0CgVVBi2tlurvkppvJwc";        // Thay bằng Anon Key của bạn
        // ------------------------------

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('leaveForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const record = {
                name: document.getElementById('name').value,
                start_date: document.getElementById('start').value,
                end_date: document.getElementById('end').value,
                phone: document.getElementById('phone').value
            };

            const { data, error } = await supabase.from('leave_records').insert([record]);
            
            if (error) {
                alert("Lỗi kết nối: " + error.message);
                console.error(error);
            } else {
                alert("Gửi thành công!");
                document.getElementById('leaveForm').reset();
            }
        });
    </script>
</body>
</html>
