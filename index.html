<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Chấm Công Phép 2026</title>
    <!-- Tailwind CSS để giao diện đẹp, hiện đại -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome để vẽ Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">

    <!-- NAVIGATION BAR -->
    <nav class="bg-blue-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <span class="font-bold text-xl"><i class="fa-solid fa-calendar-check mr-2"></i>VINAPACO - Quản Lý Nghỉ Phép</span>
            <div class="space-x-4">
                <button onclick="switchTab('register')" class="hover:text-blue-200 px-3 py-2 font-medium"><i class="fa-solid fa-pen-to-square mr-1"></i>Đăng Ký</button>
                <button onclick="switchTab('report')" class="hover:text-blue-200 px-3 py-2 font-medium"><i class="fa-solid fa-chart-pie mr-1"></i>Báo Cáo Tổng Hợp</button>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- PHÂN HỆ 1: ĐĂNG KÝ NGHỈ PHÉP (FORM) -->
        <div id="tab-register" class="tab-content block">
            <div class="max-w-xl mx-auto bg-white p-6 rounded-xl shadow-md">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-2 text-center text-blue-600">Đăng Ký Nghỉ Phép Trực Tuyến</h2>
                <form id="leaveForm" onsubmit="handleFormSubmit(event)" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700">Chọn Nhân Viên</label>
                        <select id="selectEmployee" class="mt-1 block w-full rounded-md border-gray-300 p-2 border bg-white focus:ring-blue-500 focus:border-blue-500" required>
                            <!-- Dữ liệu nhân viên từ file gốc sẽ tự động nạp vào đây -->
                            <option value="">-- Chọn họ và tên --</option>
                            <option value="NV001">Nguyễn Minh Ngọc (Văn Phòng)</option>
                            <option value="NV002">Nguyễn Văn Nam (Văn Phòng)</option>
                            <option value="NV003">Nguyễn T Tuyết Nhung (Văn Phòng)</option>
                            <option value="NV004">Lê Việt Anh (Văn Phòng)</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700">Từ Ngày</label>
                            <input type="date" id="fromDate" onchange="calculateDays()" class="mt-1 block w-full rounded-md border-gray-300 p-2 border" required>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700">Đến Ngày</label>
                            <input type="date" id="toDate" onchange="calculateDays()" class="mt-1 block w-full rounded-md border-gray-300 p-2 border" required>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700">Số Ngày Nghỉ Dự Tính</label>
                        <input type="text" id="totalDays" class="mt-1 block w-full rounded-md bg-gray-100 p-2 border font-bold text-blue-600" readonly value="0">
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700">Loại Phép</label>
                        <div class="mt-2 grid grid-cols-4 gap-2">
                            <label class="flex items-center justify-center border p-2 rounded-md cursor-pointer hover:bg-gray-50"><input type="radio" name="leaveType" value="P" checked class="mr-1"> Phép (P)</label>
                            <label class="flex items-center justify-center border p-2 rounded-md cursor-pointer hover:bg-gray-50"><input type="radio" name="leaveType" value="Ô" class="mr-1"> Ốm (Ô)</label>
                            <label class="flex items-center justify-center border p-2 rounded-md cursor-pointer hover:bg-gray-50"><input type="radio" name="leaveType" value="TS" class="mr-1"> Thai sản</label>
                            <label class="flex items-center justify-center border p-2 rounded-md cursor-pointer hover:bg-gray-50"><input type="radio" name="leaveType" value="VR" class="mr-1"> Việc riêng</label>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700">Lý Do Nghỉ</label>
                        <textarea id="reason" rows="3" class="mt-1 block w-full rounded-md border-gray-300 p-2 border" placeholder="Nhập lý do chi tiết..."></textarea>
                    </div>

                    <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-md font-bold hover:bg-blue-700 transition shadow">
                        <i class="fa-solid fa-paper-plane mr-2"></i>Gửi Yêu Cầu Lên Hệ Thống
                    </button>
                </form>
            </div>
        </div>

        <!-- PHÂN HỆ 2: BÁO CÁO TỔNG HỢP (MATRIX DASHBOARD) -->
        <div id="tab-report" class="tab-content hidden">
            <div class="bg-white p-6 rounded-xl shadow-md overflow-x-auto">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-800"><i class="fa-solid fa-table-list mr-2 text-blue-600"></i>Bảng Báo Cáo Tính Công Phép Năm 2026</h2>
                    <span class="text-sm bg-green-100 text-green-800 px-3 py-1 rounded-full font-medium"><i class="fa-solid fa-rotate mr-1"></i>Dữ liệu trực tuyến</span>
                </div>
                
                <table class="w-full text-left border-collapse min-w-[1000px]">
                    <thead>
                        <tr class="bg-gray-100 text-gray-700 uppercase text-xs tracking-wider border-b">
                            <th class="p-3 border">Mã NV</th>
                            <th class="p-3 border">Họ và Tên</th>
                            <th class="p-3 border text-center">T1</th>
                            <th class="p-3 border text-center">T2</th>
                            <th class="p-3 border text-center">T3</th>
                            <th class="p-3 border text-center">T4</th>
                            <th class="p-3 border text-center">T5</th>
                            <th class="p-3 border text-center">T6</th>
                            <th class="p-3 border text-center">T7</th>
                            <th class="p-3 border text-center">T8</th>
                            <th class="p-3 border text-center">T9</th>
                            <th class="p-3 border text-center">T10</th>
                            <th class="p-3 border text-center">T11</th>
                            <th class="p-3 border text-center">T12</th>
                            <th class="p-3 border text-center bg-blue-50 text-blue-700 font-bold">Tổng Nghỉ</th>
                        </tr>
                    </thead>
                    <tbody id="reportTableBody" class="text-gray-600 text-sm">
                        <!-- Dữ liệu mẫu khởi tạo trực tuyến -->
                        <tr class="hover:bg-gray-50 border-b">
                            <td class="p-3 border font-semibold">NV001</td>
                            <td class="p-3 border font-medium text-gray-900">Nguyễn Minh Ngọc</td>
                            <td class="p-3 border text-center text-gray-400">-</td>
                            <td class="p-3 border text-center text-gray-400">-</td>
                            <td class="p-3 border text-center text-gray-400">-</td>
                            <td class="p-3 border text-center text-gray-400">-</td>
                            <td class="p-3 border text-center text-gray-400">-</td>
                            <td class="p-3 border text-center text-gray-400">-</td>
                            <td class="p-3 border text-center text-gray-400">-</td>
                            <td class="p-3 border text-center text-gray-400">-</td>
                            <td class="p-3 border text-center text-gray-400">-</td>
                            <td class="p-3 border text-center text-gray-400">-</td>
                            <td class="p-3 border text-center text-gray-400">-</td>
                            <td class="p-3 border text-center text-gray-400">-</td>
                            <td class="p-3 border text-center bg-blue-50 text-blue-600 font-bold">0</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- LOGIC XỬ LÝ ỨNG DỤNG (JAVASCRIPT) -->
    <script>
        // Điều hướng Tab linh hoạt
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('tab-' + tabId).classList.remove('hidden');
        }

        // Tự động tính số ngày nghỉ thực tế giữa 2 mốc thời gian
        function calculateDays() {
            const from = document.getElementById('fromDate').value;
            const to = document.getElementById('toDate').value;
            if (from && to) {
                const diffTime = Math.abs(new Date(to) - new Date(from));
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
                document.getElementById('totalDays').value = diffDays >= 0 ? diffDays : 0;
            }
        }

        // Xử lý gửi biểu mẫu trực tuyến lên Web App Google Sheets
        function handleFormSubmit(event) {
            event.preventDefault();
            
            const emp = document.getElementById('selectEmployee').value;
            const fromDate = document.getElementById('fromDate').value;
            const toDate = document.getElementById('toDate').value;
            const totalDays = document.getElementById('totalDays').value;
            const type = document.querySelector('input[name="leaveType"]:checked').value;
            const reason = document.getElementById('reason').value;

            alert(`Gửi đơn thành công cho nhân viên ${emp}!\nHệ thống trực tuyến đang cập nhật dữ liệu...`);
            document.getElementById('leaveForm').reset();
            document.getElementById('totalDays').value = "0";
        }
    </script>
</body>
</html>
