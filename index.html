<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VINAPACO - Quản Trị Nhân Sự 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/docx@8.2.3/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { font-family: 'Times New Roman', serif; background-color: #f1f5f9; }</style>
</head>
<body class="p-4 md:p-8">
    <div id="statusIndicator" class="max-w-6xl mx-auto mb-4 p-2 text-center text-xs font-bold rounded bg-gray-200">Đang khởi tạo kết nối...</div>

    <div class="max-w-6xl mx-auto">
        <header class="text-center bg-white p-6 rounded-2xl shadow mb-6 border-b-4 border-blue-800">
            <h1 class="text-2xl font-bold text-blue-900 uppercase">Tổng công ty Giấy Việt Nam</h1>
            <p class="text-slate-600 font-bold italic">Hệ thống quản trị nhân sự & phép năm 2026</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-xl shadow border">
                    <h3 class="font-bold mb-4 text-blue-800 border-b pb-2">I. Đồng bộ dữ liệu nhân sự</h3>
                    <input type="file" id="excelInput" class="w-full text-sm border p-2 mb-3">
                    <button onclick="processExcel()" class="w-full bg-blue-700 text-white py-2 rounded font-bold hover:bg-blue-800">Nạp danh sách</button>
                </div>

                <div class="bg-white p-6 rounded-xl shadow border">
                    <h3 class="font-bold mb-4 text-green-800 border-b pb-2">II. Đăng ký xin nghỉ phép và Xuất đơn</h3>
                    <label class="block text-[10px] font-bold text-slate-500 mb-1">HỌ VÀ TÊN</label>
                    <select id="empSelect" class="w-full border p-2 mb-3"></select>
                    <div class="grid grid-cols-2 gap-2 mb-3">
                        <div><label class="block text-[10px] font-bold text-slate-500 mb-1">TỪ NGÀY</label><input type="date" id="dateStart" class="w-full border p-2 text-sm" onchange="calcDays()"></div>
                        <div><label class="block text-[10px] font-bold text-slate-500 mb-1">ĐẾN NGÀY</label><input type="date" id="dateEnd" class="w-full border p-2 text-sm" onchange="calcDays()"></div>
                    </div>
                    <label class="block text-[10px] font-bold text-slate-500 mb-1">SỐ NGÀY NGHỈ</label>
                    <input type="text" id="daysCount" readonly class="w-full border p-2 mb-3 bg-gray-100 font-bold text-sm">
                    <label class="block text-[10px] font-bold text-slate-500 mb-1">LÝ DO NGHỈ</label>
                    <input type="text" id="reason" class="w-full border p-2 mb-4 text-sm">
                    <button onclick="exportWord()" class="w-full bg-slate-700 text-white py-2 rounded font-bold text-sm">Xuất đơn xin nghỉ phép (Word)</button>
                </div>
            </div>

            <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow border">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h3 class="font-bold text-indigo-800">III. Bảng theo dõi chấm công phép</h3>
                    <div class="flex gap-2">
                        <input type="password" id="adminPass" onkeypress="checkEnter(event)" placeholder="Mật khẩu QTV" class="border p-1 w-24 text-xs">
                        <button onclick="updateBulk()" class="bg-blue-600 text-white px-2 py-1 rounded text-[10px] font-bold">Sửa hàng loạt</button>
                        <button onclick="exportExcelReport()" class="bg-emerald-700 text-white px-2 py-1 rounded text-[10px] font-bold">Xuất Excel chuẩn</button>
                    </div>
                </div>
                <table class="w-full text-sm text-center border">
                    <thead class="bg-slate-100 uppercase"><tr><th>Họ Tên</th><th>Công định mức</th><th>Thực tế</th><th>Thao tác</th></tr></thead>
                    <tbody id="statsBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://qztflyvraluxtpzbmtgp.supabase.co";
        const SUPABASE_KEY = "sb_publishable_MHTau0ZEnlDWdyfwfQZE-A_LAdOTm-B";
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- CÁC HÀM QUẢN TRỊ ĐỊNH MỨC ---
        async function updateStaffBaseWork(name) {
            if(localStorage.getItem('isAdmin') !== 'true') return alert("Cảnh báo: Cần mật khẩu QTV!");
            const val = prompt("Nhập công định mức cho " + name + ":");
            if(val) {
                await client.from('employees_list').update({base_work: val}).eq('name', name);
                refreshAll();
            }
        }

        async function updateBulk() {
            if(localStorage.getItem('isAdmin') !== 'true') return alert("Cảnh báo: Cần mật khẩu QTV!");
            const val = prompt("Nhập công định mức CHUNG cho tất cả nhân sự:");
            if(val) {
                await client.from('employees_list').update({base_work: val}).neq('name', 'none');
                refreshAll();
            }
        }

        // --- HÀM HỆ THỐNG (GIỮ NGUYÊN) ---
        async function refreshAll() {
            const { data } = await client.from('employees_list').select('*');
            if(!data) return;
            const select = document.getElementById('empSelect');
            select.innerHTML = data.map(e => `<option value="${e.name}">${e.name}</option>`).join('');
            document.getElementById('statsBody').innerHTML = data.map(e => `
                <tr><td class="p-2 border">${e.name}</td><td class="border">${e.base_work}</td><td class="border font-bold">${e.base_work}</td>
                <td class="border"><button onclick="updateStaffBaseWork('${e.name}')" class="text-blue-500 underline text-xs">Sửa định mức</button></td></tr>
            `).join('');
            document.getElementById('statusIndicator').className = "max-w-6xl mx-auto mb-4 p-2 text-center text-xs font-bold rounded bg-green-100 text-green-700";
            document.getElementById('statusIndicator').innerText = "Hệ thống đã kết nối trực tuyến";
        }

        function checkEnter(e) { if(e.key === "Enter") { localStorage.setItem('isAdmin', 'true'); alert("Quyền quản trị kích hoạt!"); } }
        async function processExcel() { /* Giữ nguyên */ }
        function calcDays() { /* Giữ nguyên */ }
        async function exportWord() { /* Giữ nguyên */ }
        async function exportExcelReport() { /* Giữ nguyên */ }
        window.onload = refreshAll;
    </script>
</body>
</html>
