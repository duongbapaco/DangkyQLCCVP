<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Phép & Công VINAPACO 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { font-family: "Times New Roman", Times, serif; background: #f8fafc; }</style>
</head>
<body class="p-6">
    <div id="connStatus" class="fixed top-4 right-4 px-4 py-2 rounded-full text-xs font-bold flex items-center bg-yellow-100 text-yellow-700">
        <i class="fa-solid fa-spinner fa-spin mr-2"></i> Đang kiểm tra kết nối...
    </div>

    <div class="max-w-7xl mx-auto space-y-6">
        <details class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200" open>
            <summary class="font-bold text-blue-900 cursor-pointer text-lg"><i class="fa-solid fa-file-excel mr-2 text-blue-600"></i>Bước 1: Nạp file Excel</summary>
            <input type="file" id="excelInput" class="border p-2 w-full rounded bg-slate-50">
            <button onclick="processExcel()" class="mt-4 bg-blue-700 text-white px-8 py-2 rounded font-bold hover:bg-blue-800 transition">Đồng bộ dữ liệu</button>
        </details>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h3 class="font-bold text-lg mb-4 text-slate-800"><i class="fa-solid fa-pen-to-square mr-2 text-green-600"></i>Bước 2: Đăng ký nghỉ phép</h3>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <select id="empSelect" class="border p-2 rounded col-span-2"></select>
                <input type="tel" id="phone" placeholder="SĐT" class="border p-2 rounded">
                <input type="date" id="start" class="border p-2 rounded">
                <input type="date" id="end" onchange="calc()" class="border p-2 rounded">
                <input type="text" id="days" readonly placeholder="Số ngày" class="border p-2 rounded bg-slate-100 font-bold">
                <input type="text" id="reason" placeholder="Lý do..." class="border p-2 rounded col-span-2">
            </div>
            <button onclick="saveLeave()" class="mt-4 w-full bg-green-700 text-white py-3 rounded font-bold hover:bg-green-800 transition">Lưu đơn</button>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h3 class="font-bold text-lg mb-4 text-slate-800"><i class="fa-solid fa-chart-line mr-2 text-indigo-600"></i>Bước 3: Thống kê Công & Phép</h3>
            <div class="overflow-x-auto">
                <table class="w-full border-collapse text-sm text-center">
                    <thead class="bg-slate-50 uppercase text-[11px] text-slate-500">
                        <tr><th class="p-4 text-left">Nhân sự</th><th>Công định mức</th><th>Ngày nghỉ</th><th class="text-blue-600">Công thực tế</th></tr>
                    </thead>
                    <tbody id="statsBody" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const client = supabase.createClient("https://qztflyvraluxtpzbmtgp.supabase.co", "sb_publishable_MHTau0ZEnlDWdyfwfQZE-A_LAdOTm-B");

        // Kiểm tra kết nối
        async function checkConnection() {
            const statusDiv = document.getElementById('connStatus');
            const { error } = await client.from('employees_list').select('count', { count: 'exact', head: true });
            if (!error) {
                statusDiv.className = "fixed top-4 right-4 px-4 py-2 rounded-full text-xs font-bold flex items-center bg-green-100 text-green-700";
                statusDiv.innerHTML = '<i class="fa-solid fa-check-circle mr-2"></i> Đã kết nối Supabase';
            } else {
                statusDiv.className = "fixed top-4 right-4 px-4 py-2 rounded-full text-xs font-bold flex items-center bg-red-100 text-red-700";
                statusDiv.innerHTML = '<i class="fa-solid fa-times-circle mr-2"></i> Lỗi kết nối';
            }
        }

        function getBaseWorkDays(job) {
            if (!job) return 26;
            return (job.toLowerCase().includes("hành chính") || job.toLowerCase().includes("văn phòng")) ? 22 : 26;
        }

        async function processExcel() {
            const file = document.getElementById('excelInput').files[0];
            const reader = new FileReader();
            reader.onload = async function(e) {
                const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                
                const emps = json.map(r => ({
                    name: r["Họ và tên"],
                    base_leave: 12 + (r["NNĐH"] ? 2 : 0) + (r["An toàn viên"] ? 2 : 0),
                    base_work: getBaseWorkDays(r["Chức danh công việc"])
                }));
                await client.from('employees_list').upsert(emps);
                alert("Đồng bộ thành công!");
                refreshStats();
            };
            reader.readAsArrayBuffer(file);
        }

        async function refreshStats() {
            const { data: emps } = await client.from('employees_list').select('*');
            const { data: recs } = await client.from('leave_records').select('*');
            document.getElementById('statsBody').innerHTML = emps.map(e => {
                const used = recs.filter(r => r.name === e.name).reduce((s, r) => s + r.days, 0);
                return `<tr>
                    <td class="p-4 text-left font-medium">${e.name}</td>
                    <td class="p-4">${e.base_work}</td>
                    <td class="p-4">${used}</td>
                    <td class="p-4 font-bold text-blue-600">${e.base_work - used}</td>
                </tr>`;
            }).join('');
        }

        window.onload = () => { checkConnection(); refreshStats(); };
    </script>
</body>
</html>
