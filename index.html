<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VINAPACO - Hệ Thống Quản Trị Nhân Sự 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/docx@8.2.3/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { font-family: 'Times New Roman', serif; background-color: #f1f5f9; }</style>
</head>
<body class="p-6">
    <div id="statusIndicator" class="max-w-6xl mx-auto mb-4 p-2 text-center text-sm font-bold rounded-lg bg-gray-200">Đang kiểm tra kết nối...</div>

    <div class="max-w-6xl mx-auto">
        <header class="text-center bg-white p-6 rounded-2xl shadow-sm mb-6 border-b-4 border-blue-800">
            <h1 class="text-3xl font-bold text-blue-900 uppercase">Tổng công ty Giấy Việt Nam</h1>
            <p class="text-slate-600 font-bold italic mt-2">Hệ thống quản trị nhân sự & phép năm 2026</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-xl shadow border">
                    <h3 class="font-bold mb-4 text-blue-800 border-b pb-2">I. Đồng bộ dữ liệu nhân sự</h3>
                    <input type="file" id="excelInput" class="w-full text-sm border p-2 mb-3">
                    <button onclick="processExcel()" class="w-full bg-blue-700 text-white py-2 rounded font-bold hover:bg-blue-800">Nạp danh sách nhân sự</button>
                </div>

                <div class="bg-white p-6 rounded-xl shadow border">
                    <h3 class="font-bold mb-4 text-green-800 border-b pb-2">II. Đăng ký xin nghỉ phép</h3>
                    <label class="block text-xs font-bold text-slate-500 mb-1">HỌ VÀ TÊN</label>
                    <select id="empSelect" class="w-full border p-2 mb-3"></select>
                    
                    <div class="grid grid-cols-2 gap-2 mb-3">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">TỪ NGÀY</label>
                            <input type="date" id="dateStart" class="w-full border p-2 text-sm" onchange="calcDays()">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1">ĐẾN NGÀY</label>
                            <input type="date" id="dateEnd" class="w-full border p-2 text-sm" onchange="calcDays()">
                        </div>
                    </div>
                    
                    <label class="block text-xs font-bold text-slate-500 mb-1">SỐ NGÀY NGHỈ</label>
                    <input type="text" id="daysCount" readonly class="w-full border p-2 mb-3 bg-gray-100 font-bold">
                    
                    <label class="block text-xs font-bold text-slate-500 mb-1">LÝ DO NGHỈ PHÉP</label>
                    <input type="text" id="reason" class="w-full border p-2 mb-4">
                    
                    <button onclick="exportWord()" class="w-full bg-slate-700 text-white py-2 rounded font-bold">Xuất đơn xin nghỉ phép</button>
                </div>
            </div>

            <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow border">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h3 class="font-bold text-indigo-800">III. Bảng theo dõi chấm công phép</h3>
                    <div class="flex gap-2">
                        <input type="password" id="adminPass" onkeypress="checkEnter(event)" placeholder="Mật khẩu QTV" class="border p-1 w-24 text-xs">
                        <button onclick="exportExcelReport()" class="bg-emerald-700 text-white px-3 py-1 rounded text-xs font-bold">Xuất Excel chuẩn</button>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-center border">
                        <thead class="bg-slate-100"><tr><th>Họ Tên</th><th>Công định mức</th><th>Phép năm (Luật)</th><th>Đã nghỉ</th><th>Công thực tế</th><th>Thao tác</th></tr></thead>
                        <tbody id="statsBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://qztflyvraluxtpzbmtgp.supabase.co";
        const SUPABASE_KEY = "sb_publishable_MHTau0ZEnlDWdyfwfQZE-A_LAdOTm-B";
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function refreshAll() {
            const { data } = await client.from('employees_list').select('*');
            if(!data) return;
            
            // Cập nhật Select box
            const select = document.getElementById('empSelect');
            select.innerHTML = data.map(e => `<option value="${e.name}">${e.name}</option>`).join('');
            
            // Cập nhật Bảng thống kê
            document.getElementById('statsBody').innerHTML = data.map(e => `
                <tr><td class="p-2 border">${e.name}</td><td class="border">22</td><td class="border">12</td><td class="border">0</td><td class="border font-bold">22</td>
                <td class="border"><button onclick="actionStaff('Sửa', '${e.name}')" class="text-blue-500 mr-2">Sửa</button><button onclick="actionStaff('Xóa', '${e.name}')" class="text-red-500">Xóa</button></td></tr>
            `).join('');
        }

        async function processExcel() {
            const file = document.getElementById('excelInput').files[0];
            const reader = new FileReader();
            reader.onload = async (e) => {
                const wb = XLSX.read(e.target.result, {type: 'binary'});
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                const emps = json.map(r => ({ name: r["Họ và tên"] || r["Ho va ten"], base_work: 22 }));
                await client.from('employees_list').upsert(emps);
                alert("Đồng bộ danh sách thành công!");
                refreshAll(); // Tự động cập nhật giao diện
            };
            reader.readAsBinaryString(file);
        }

        function checkEnter(e) { if(e.key === "Enter") { localStorage.setItem('isAdmin', 'true'); alert("Quyền quản trị kích hoạt!"); } }
        function actionStaff(act, name) { if(localStorage.getItem('isAdmin') !== 'true') return alert("Cần mật khẩu QTV!"); alert(act + " " + name); }
        function calcDays() { /* Tính ngày nghỉ logic cũ */ }
        async function exportWord() { /* Logic tạo file Word */ }
        async function exportExcelReport() { /* Logic tạo file Excel */ }

        window.onload = refreshAll;
    </script>
</body>
</html>
