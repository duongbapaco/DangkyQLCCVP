<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Quản Lý Công Phép VINAPACO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Times New Roman', serif; }
        .print-area { background: white; padding: 2cm; margin: 20px auto; max-width: 21cm; min-height: 29.7cm; border: 1px solid #ccc; }
    </style>
</head>
<body class="bg-gray-100">
    <div class="max-w-2xl mx-auto mt-10 p-6 bg-white shadow-lg rounded">
        <h2 class="text-xl font-bold mb-4 uppercase">Đơn Đăng Ký Nghỉ Phép</h2>
        <div class="grid grid-cols-2 gap-4">
            <input id="name" placeholder="Họ và tên" class="border p-2">
            <input id="days" type="number" placeholder="Số ngày nghỉ" class="border p-2">
            <textarea id="reason" placeholder="Lý do nghỉ" class="col-span-2 border p-2"></textarea>
            <button onclick="submitRequest()" class="bg-blue-800 text-white p-2">Gửi Đơn</button>
        </div>
    </div>

    <script>
        // LƯU Ý: Thay thế bằng ANON_KEY thực tế từ bảng điều khiển Supabase
        const supabase = supabase.createClient('https://xfmmfoidlqnhbdjpzqoe.supabase.co', 'YOUR_PUBLIC_ANON_KEY');

        async function submitRequest() {
            const data = {
                name: document.getElementById('name').value,
                days: document.getElementById('days').value,
                reason: document.getElementById('reason').value,
                created_at: new Date()
            };
            
            const { error } = await supabase.from('leave_records').insert([data]);
            if (error) alert("Lỗi hệ thống: " + error.message);
            else alert("Đã gửi đơn thành công!");
        }
    </script>
</body>
</html>
