<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VINAPACO - Quản Trị Nhân Sự 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/docx@8.2.3/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { font-family: 'Times New Roman', serif; background-color: #f1f5f9; }</style>
</head>
<body class="p-4 md:p-8">

    <div id="statusIndicator" class="max-w-6xl mx-auto mb-4 p-2 text-center text-sm font-bold rounded-lg bg-gray-200 text-gray-700">
        <i class="fa-solid fa-spinner fa-spin mr-2"></i> Đang kiểm tra kết nối hệ thống...
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="text-center bg-white p-6 rounded-2xl shadow-sm mb-6 border-b-4 border-blue-800">
            <h1 class="text-3xl font-bold text-blue-900 uppercase">Tổng công ty Giấy Việt Nam</h1>
            <p class="text-slate-600 font-bold italic mt-2">Hệ thống quản trị nhân sự & phép năm 2026</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-xl shadow border">
                    <h3 class="font-bold mb-4 text-blue-800 border-b pb-2">I. Đồng bộ dữ liệu</h3>
                    <input type="file" id="excelInput" class="w-full text-sm border p-2 mb-3">
                    <button onclick="processExcel()" class="w-full bg-blue-700 text-white py-2 rounded font-bold hover:bg-blue-800">Nạp danh sách nhân sự</button>
                </div>
                
                <div class="bg-white p-6 rounded-xl shadow border">
                    <h3 class="font-bold mb-4 text-green-800 border-b pb-2">II. Đăng ký & Xuất đơn</h3>
                    <select id="empSelect" class="w-full border p-2 mb-3"></select>
                    <div class="grid grid-cols-2 gap-2 mb-3">
                        <input type="date" id="dateStart" class="border p-2 text-sm" onchange="calcDays()">
                        <input type="date" id="dateEnd" class="border p-2 text-sm" onchange="calcDays()">
                    </div>
                    <input type="text" id="daysCount" readonly placeholder="Số ngày nghỉ" class="w-full border p-2 mb-2 bg-gray-100 font-bold">
                    <input type="text" id="reason" placeholder="Lý do nghỉ" class="w-full border p-2 mb-4">
                    <button onclick="exportWord()" class="w-full bg-slate-700 text-white py-2 rounded font-bold">Xuất Đơn (Word Linh Hoạt)</button>
                </div>
            </div>

            <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow border">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h3 class="font-bold text-indigo-800">III. Bảng Theo Dõi Công Phép</h3>
                    <div class="flex gap-2">
                        <input type="password" id="adminPass" onkeypress="checkEnter(event)" placeholder="Mật khẩu QTV (Enter)" class="border p-1 w-32 text-xs">
                        <button onclick="exportExcelReport()" class="bg-emerald-700 text-white px-3 py-1 rounded text-xs font-bold">Xuất Excel Chuẩn</button>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-center border">
                        <thead class="bg-slate-100"><tr><th>Họ Tên</th><th>Định mức</th><th>Phép năm</th><th>Đã nghỉ</th><th>Thực tế</th><th>Thao tác</th></tr></thead>
                        <tbody id="statsBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- ĐIỀN THÔNG TIN SUPABASE ---
        const SUPABASE_URL = "https://qztflyvraluxtpzbmtgp.supabase.co";
        const SUPABASE_KEY = "sb_publishable_MHTau0ZEnlDWdyfwfQZE-A_LAdOTm-B";
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- KIỂM TRA TRẠNG THÁI KẾT NỐI ---
        async function checkConnection() {
            const status = document.getElementById('statusIndicator');
            try {
                const { error } = await client.from('employees_list').select('*', { head: true, count: 'exact' });
                if (!error) {
                    status.className = "max-w-6xl mx-auto mb-4 p-2 text-center text-sm font-bold rounded-lg bg-green-100 text-green-700";
                    status.innerHTML = '<i class="fa-solid fa-check-circle mr-2"></i> Hệ thống đã kết nối trực tuyến với Database';
                }
            } catch (e) {
                status.className = "max-w-6xl mx-auto mb-4 p-2 text-center text-sm font-bold rounded-lg bg-red-100 text-red-700";
                status.innerHTML = '<i class="fa-solid fa-triangle-exclamation mr-2"></i> Mất kết nối Database! Vui lòng kiểm tra lại URL/KEY.';
            }
        }
        window.onload = () => { checkConnection(); refreshStats(); };

        // --- CÁC HÀM XỬ LÝ (Sửa, Xóa, Word, Excel) ---
        function checkEnter(e) { if(e.key === "Enter") { localStorage.setItem('isAdmin', 'true'); alert("Quyền quản trị đã kích hoạt!"); } }
        
        async function exportWord() {
            const { Document, Packer, Paragraph, TextRun } = docx;
            const doc = new Document({ sections: [{ children: [
                new Paragraph({ children: [new TextRun({ text: "TỔNG CÔNG TY GIẤY VIỆT NAM", bold: true }), new TextRun("\nĐỘC LẬP - TỰ DO - HẠNH PHÚC")], alignment: "center" }),
                new Paragraph({ children: [new TextRun({ text: "\nĐƠN XIN NGHỈ PHÉP", bold: true, size: 32 })], alignment: "center" }),
                new Paragraph({ children: [new TextRun("\nTôi tên là: " + document.getElementById('empSelect').value)], spacing: {after: 200} }),
                new Paragraph({ children: [new TextRun("Lý do nghỉ: " + document.getElementById('reason').value)] })
            ]}]});
            Packer.toBlob(doc).then(blob => saveAs(blob, "Don_Xin_Nghi.docx"));
        }

        async function exportExcelReport() {
            const wb = new ExcelJS.Workbook();
            const ws = wb.addWorksheet('Bảng Chấm Công');
            ws.mergeCells('A1:F1'); ws.getCell('A1').value = "TỔNG CÔNG TY GIẤY VIỆT NAM";
            ws.addRow(['Họ và tên', 'Công định mức', 'Phép năm (Luật)', 'Đã nghỉ', 'Tổng công thực tế']);
            const buffer = await wb.xlsx.writeBuffer();
            saveAs(new Blob([buffer]), "Bang_Theo_Doi_Cong_Phep_2026.xlsx");
        }

        async function refreshStats() { /* Logic hiển thị danh sách từ DB */ }
        function calcDays() { /* Tính ngày nghỉ */ }
    </script>
</body>
</html>
