<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VINAPACO - Hệ Thống Quản Trị Nhân Sự 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background-color: #f8fafc; }
        .data-table th, .data-table td { padding: 10px; border: 1px solid #e2e8f0; text-align: center; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto mb-6 text-center">
        <h1 class="text-3xl font-bold text-slate-800">TỔNG CÔNG TY GIẤY VIỆT NAM</h1>
        <h2 class="text-xl text-slate-600 mb-2">Hệ thống quản trị nhân sự & phép năm 2026</h2>
        <div id="status-bar" class="inline-block px-4 py-1 rounded-full text-xs font-bold text-white shadow">
            Đang kiểm tra kết nối...
        </div>
    </div>

    <div class="max-w-7xl mx-auto grid grid-cols-12 gap-6">
        <div class="col-span-4 bg-white p-6 rounded-xl shadow border">
            <h2 class="font-bold mb-4 text-slate-800 border-b pb-2">Đăng ký & Cập nhật thông tin</h2>
            
            <label class="block text-xs font-bold text-slate-500 mb-1">HỌ VÀ TÊN</label>
            <select id="empSelect" class="w-full border p-2 mb-3 rounded"></select>

            <div class="grid grid-cols-2 gap-2">
                <div><label class="block text-xs font-bold text-slate-500 mb-1">CÔNG ĐỊNH MỨC</label><input type="number" id="baseWork" value="22" class="w-full border p-2 mb-3 rounded"></div>
                <div><label class="block text-xs font-bold text-slate-500 mb-1">SỐ ĐIỆN THOẠI</label><input type="text" id="phone" class="w-full border p-2 mb-3 rounded"></div>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div><label class="block text-xs font-bold text-slate-500 mb-1">TỪ NGÀY</label><input type="date" id="dateStart" class="w-full border p-2 mb-3 rounded" onchange="autoCalc()"></div>
                <div><label class="block text-xs font-bold text-slate-500 mb-1">ĐẾN NGÀY</label><input type="date" id="dateEnd" class="w-full border p-2 mb-3 rounded" onchange="autoCalc()"></div>
            </div>
            
            <div class="mb-3"><label class="block text-xs font-bold text-slate-500 mb-1">SỐ NGÀY NGHỈ</label><input type="number" id="daysCount" value="0" class="w-full border p-2 bg-gray-100 rounded" readonly></div>

            <label class="block text-xs font-bold text-slate-500 mb-1">LÝ DO XIN NGHỈ</label>
            <input type="text" id="reason" class="w-full border p-2 mb-4 rounded">
            
            <button onclick="saveLeave()" class="w-full bg-green-600 text-white py-2 rounded font-bold hover:bg-green-700">LƯU / CẬP NHẬT ĐƠN</button>
        </div>

        <div class="col-span-8 bg-white p-6 rounded-xl shadow border">
            <table class="w-full text-sm data-table">
                <thead>
                    <tr class="bg-slate-100">
                        <th>Họ Tên</th><th>SĐT</th><th>Thời gian nghỉ</th><th>Công ĐM</th><th>Đã nghỉ</th><th>Công thực tế</th><th>Còn lại</th><th>Trạng thái</th><th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="mainBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const client = supabase.createClient("https://qztflyvraluxtpzbmtgp.supabase.co", "sb_publishable_MHTau0ZEnlDWdyfwfQZE-A_LAdOTm-B");
        const PHEP_LUAT = 12;

        async function checkConnection() {
            const bar = document.getElementById('status-bar');
            try {
                const { error } = await client.from('employees_list').select('id', { count: 'exact', head: true });
                if (!error) {
                    bar.textContent = "● ĐÃ KẾT NỐI HỆ THỐNG";
                    bar.className = "inline-block px-4 py-1 rounded-full text-xs font-bold text-white shadow bg-green-600";
                } else throw error;
            } catch (e) {
                bar.textContent = "○ MẤT KẾT NỐI HỆ THỐNG";
                bar.className = "inline-block px-4 py-1 rounded-full text-xs font-bold text-white shadow bg-red-600";
            }
        }

        function formatVNDate(dateStr) {
            if (!dateStr) return "";
            const [y, m, d] = dateStr.split('-');
            return `${d}/${m}/${y}`;
        }

        function autoCalc() {
            const s = new Date(document.getElementById('dateStart').value);
            const e = new Date(document.getElementById('dateEnd').value);
            const d = Math.ceil((e - s)/(1000*60*60*24) + 1);
            document.getElementById('daysCount').value = (d > 0) ? d : 0;
        }

        async function saveLeave() {
            const name = document.getElementById('empSelect').value;
            const base_work = parseInt(document.getElementById('baseWork').value);
            const phone = document.getElementById('phone').value;
            const start = document.getElementById('dateStart').value;
            const end = document.getElementById('dateEnd').value;
            const reason = document.getElementById('reason').value;
            const days = parseInt(document.getElementById('daysCount').value);
            
            if (!start || !end) { alert("⚠️ Vui lòng chọn đầy đủ ngày bắt đầu và kết thúc!"); return; }

            await client.from('employees_list').upsert({name, base_work, phone});
            const { error } = await client.from('leave_records').upsert({name, start, end, days, reason}, {onConflict: 'name'});
            
            if(error) alert("Lỗi hệ thống: " + error.message);
            else { alert("✅ Đã lưu/cập nhật thông tin thành công!"); refresh(); }
        }

        function fillEdit(n, dm, p, s, e, r) {
            document.getElementById('empSelect').value = n;
            document.getElementById('baseWork').value = dm;
            document.getElementById('phone').value = p;
            document.getElementById('dateStart').value = s;
            document.getElementById('dateEnd').value = e;
            document.getElementById('reason').value = r;
            autoCalc();
            alert("Đã đổ thông tin vào form, bạn có thể chỉnh sửa Công Định Mức hoặc thông tin khác!");
        }

        async function delRecord(name) {
            const pass = prompt("Vui lòng nhập mật khẩu quản trị để XÓA đơn này:");
            if(pass === "123456") {
                const { error } = await client.from('leave_records').delete().eq('name', name);
                if(error) alert("Lỗi xóa: " + error.message);
                else { alert("✅ Đã xóa đơn thành công!"); refresh(); }
            } else if(pass !== null) { alert("❌ Sai mật khẩu!"); }
        }

        async function refresh() {
            const { data: emps } = await client.from('employees_list').select('*');
            const { data: leaves } = await client.from('leave_records').select('*');
            
            if(emps) {
                document.getElementById('empSelect').innerHTML = emps.map(e => `<option value="${e.name}">${e.name}</option>`).join('');
                document.getElementById('mainBody').innerHTML = emps.map(e => {
                    const l = (leaves || []).find(x => x.name?.trim() === e.name?.trim()) || {days: 0, start: '', end: '', reason: ''};
                    const conLai = PHEP_LUAT - (l.days || 0);
                    const dateDisplay = l.start ? `${formatVNDate(l.start)} đến ${formatVNDate(l.end)}` : "";
                    
                    return `<tr>
                        <td>${e.name}</td><td>${e.phone || ''}</td>
                        <td>${dateDisplay}</td>
                        <td>${e.base_work || 22}</td><td>${l.days || 0}</td>
                        <td>${(e.base_work || 22) - (l.days || 0)}</td>
                        <td class="font-bold">${conLai}</td>
                        <td class="${conLai <= 0 ? 'text-red-600' : 'text-green-600'}">${conLai <= 0 ? "Hết phép" : "Còn phép"}</td>
                        <td>
                            <button onclick="fillEdit('${e.name}', ${e.base_work || 22}, '${e.phone || ''}', '${l.start || ''}', '${l.end || ''}', '${l.reason || ''}')" class="text-blue-600 font-bold">Sửa</button>
                            <button onclick="delRecord('${e.name}')" class="text-red-600 ml-2 font-bold">Xóa</button>
                        </td>
                    </tr>`;
                }).join('');
            }
        }

        window.onload = () => { refresh(); checkConnection(); };
    </script>
</body>
</html>
