<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VINAPACO - Quản Trị Nhân Sự 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background-color: #f8fafc; font-size: 16px; }
        .data-table td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
    </style>
</head>
<body class="p-6">

    <div id="statusIndicator" class="max-w-6xl mx-auto mb-4 p-3 text-center text-sm font-bold rounded shadow bg-slate-200 text-slate-700">
        Đang tải dữ liệu...
    </div>

    <div class="max-w-6xl mx-auto">
        <header class="text-center bg-white p-6 rounded-xl shadow border-b-4 border-blue-800 mb-6">
            <h1 class="text-2xl font-bold text-blue-900 uppercase">Tổng công ty Giấy Việt Nam - Hệ thống Quản trị 2026</h1>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="space-y-6">
                <div class="bg-white p-6 rounded-xl shadow border">
                    <h3 class="font-bold mb-4 text-blue-800 border-b pb-2">I. Đồng bộ dữ liệu</h3>
                    <input type="file" id="excelInput" class="w-full text-sm border p-2 mb-3">
                    <button onclick="processExcel()" class="w-full bg-blue-700 text-white py-2 rounded font-bold hover:bg-blue-800">Nạp danh sách</button>
                </div>

                <div class="bg-white p-6 rounded-xl shadow border">
                    <h3 class="font-bold mb-4 text-green-800 border-b pb-2">II. Đăng ký nghỉ phép</h3>
                    <label class="block text-xs font-bold text-slate-500 mb-1">HỌ VÀ TÊN</label>
                    <select id="empSelect" class="w-full border p-2 mb-3 rounded"></select>
                    <div class="grid grid-cols-2 gap-2 mb-3">
                        <div><label class="block text-xs font-bold text-slate-500 mb-1">TỪ</label><input type="date" id="dateStart" class="w-full border p-2" onchange="calcDays()"></div>
                        <div><label class="block text-xs font-bold text-slate-500 mb-1">ĐẾN</label><input type="date" id="dateEnd" class="w-full border p-2" onchange="calcDays()"></div>
                    </div>
                    <label class="block text-xs font-bold text-slate-500 mb-1">SỐ NGÀY NGHỈ</label>
                    <input type="number" id="daysCount" value="0" class="w-full border p-2 mb-3 bg-gray-50 font-bold" readonly>
                    <button onclick="saveLeave()" class="w-full bg-green-600 text-white py-2 rounded font-bold hover:bg-green-700 mb-2">Lưu Đăng Ký</button>
                    <button onclick="exportWord()" class="w-full bg-slate-700 text-white py-2 rounded font-bold">Xuất đơn nghỉ phép</button>
                </div>
            </div>

            <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow border">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h3 class="font-bold text-indigo-800">III. Bảng theo dõi chấm công phép</h3>
                    <div class="flex gap-2">
                        <input type="password" id="adminPass" placeholder="Mật khẩu QTV" class="border p-1 w-24 text-xs">
                        <button onclick="updateBulk()" class="bg-blue-600 text-white px-2 py-1 rounded text-[10px] font-bold">Sửa hàng loạt</button>
                    </div>
                </div>
                <table class="w-full text-sm text-center data-table">
                    <thead>
                        <tr class="bg-slate-50 text-slate-600"><th>Họ Tên</th><th>Định mức</th><th>Đã nghỉ</th><th>Còn lại</th><th>Thao tác</th></tr>
                    </thead>
                    <tbody id="statsBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://qztflyvraluxtpzbmtgp.supabase.co";
        const SUPABASE_KEY = "sb_publishable_MHTau0ZEnlDWdyfwfQZE-A_LAdOTm-B";
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Lưu trạng thái nghỉ phép của nhân viên vào bộ nhớ trình duyệt
        function saveLeave() {
            const name = document.getElementById('empSelect').value;
            const days = document.getElementById('daysCount').value;
            localStorage.setItem('leave_' + name, days);
            alert("Đã lưu nghỉ phép cho " + name);
            refreshAll();
        }

        function calcDays() {
            const start = new Date(document.getElementById('dateStart').value);
            const end = new Date(document.getElementById('dateEnd').value);
            document.getElementById('daysCount').value = (end >= start) ? (end - start) / (1000 * 60 * 60 * 24) + 1 : 0;
        }

        async function updateStaffBaseWork(name) {
            const pass = document.getElementById('adminPass').value;
            if(pass !== "vinapaco2026") return alert("Cần mật khẩu QTV!");
            const newVal = prompt("Nhập công định mức:");
            if(newVal) {
                await client.from('employees_list').update({base_work: newVal}).eq('name', name);
                refreshAll();
            }
        }

        async function updateBulk() {
            const pass = document.getElementById('adminPass').value;
            if(pass !== "vinapaco2026") return alert("Cần mật khẩu QTV!");
            const newVal = prompt("Nhập công định mức CHUNG:");
            if(newVal) {
                await client.from('employees_list').update({base_work: newVal}).neq('name', 'none');
                refreshAll();
            }
        }

        async function refreshAll() {
            const { data } = await client.from('employees_list').select('*');
            if(!data) return;
            
            const select = document.getElementById('empSelect');
            if(select.children.length === 0) {
                select.innerHTML = data.map(e => `<option value="${e.name}">${e.name}</option>`).join('');
            }

            document.getElementById('statsBody').innerHTML = data.map(e => {
                const base = parseInt(e.base_work || 22);
                const taken = parseInt(localStorage.getItem('leave_' + e.name) || 0);
                const rest = base - taken;
                return `<tr>
                    <td class="font-bold">${e.name}</td>
                    <td>${base}</td>
                    <td class="text-red-600 font-bold">${taken}</td>
                    <td class="text-blue-700 font-bold">${rest}</td>
                    <td><button onclick="updateStaffBaseWork('${e.name}')" class="text-blue-500 underline text-xs">Sửa</button></td>
                </tr>`;
            }).join('');
            
            document.getElementById('statusIndicator').className = "max-w-6xl mx-auto mb-4 p-3 text-center text-sm font-bold rounded shadow bg-emerald-100 text-emerald-700";
            document.getElementById('statusIndicator').innerText = "Số liệu đã được đồng bộ hóa thành công.";
        }

        async function processExcel() { /* Logic nạp data */ refreshAll(); }
        async function exportWord() { /* Logic xuất đơn */ }
        
        window.onload = refreshAll;
    </script>
</body>
</html>
