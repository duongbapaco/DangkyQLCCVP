<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>VINAPACO - Hệ Thống Quản Trị Nhân Sự 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Times New Roman', serif; background-color: #f8fafc; }
        .data-table th, .data-table td { padding: 10px; border: 1px solid #e2e8f0; text-align: center; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto mb-8 text-center">
        <h1 class="text-3xl font-bold text-slate-800">TỔNG CÔNG TY GIẤY VIỆT NAM</h1>
        <h2 class="text-xl text-slate-600">Hệ thống quản trị nhân sự & phép năm 2026</h2>
    </div>

    <div class="max-w-7xl mx-auto grid grid-cols-12 gap-6">
        <div class="col-span-4 bg-white p-6 rounded-xl shadow border">
            <h2 class="font-bold mb-4 text-slate-800 border-b pb-2">Đăng ký & Quản trị</h2>
            <input type="password" id="qtvPass" placeholder="Nhập mật mã QTV & Enter" class="w-full border p-2 mb-3 rounded bg-yellow-50" onkeypress="handleAuth(event)">
            
            <button onclick="document.getElementById('excelFile').click()" class="w-full bg-slate-800 text-white p-2 rounded mb-4 font-bold">NẠP DS EXCEL</button>
            <input type="file" id="excelFile" class="hidden" onchange="importExcel(event)">

            <label class="block text-xs font-bold text-slate-500 mb-1">HỌ VÀ TÊN</label>
            <select id="empSelect" class="w-full border p-2 mb-3 rounded"></select>

            <div class="grid grid-cols-2 gap-2">
                <div><label class="block text-xs font-bold text-slate-500 mb-1">CÔNG ĐỊNH MỨC</label><input type="number" id="baseWork" value="22" class="w-full border p-2 mb-3 rounded"></div>
                <div><label class="block text-xs font-bold text-slate-500 mb-1">SỐ ĐIỆN THOẠI</label><input type="text" id="phone" class="w-full border p-2 mb-3 rounded"></div>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div><label class="block text-xs font-bold text-slate-500 mb-1">TỪ NGÀY</label><input type="date" id="dateStart" class="w-full border p-2 mb-3 rounded" onchange="autoCalcDays()"></div>
                <div><label class="block text-xs font-bold text-slate-500 mb-1">ĐẾN NGÀY</label><input type="date" id="dateEnd" class="w-full border p-2 mb-3 rounded" onchange="autoCalcDays()"></div>
            </div>
            
            <div class="mb-3"><label class="block text-xs font-bold text-slate-500 mb-1">SỐ NGÀY NGHỈ (TỰ ĐỘNG)</label><input type="number" id="daysCount" value="0" class="w-full border p-2 bg-gray-100 rounded" readonly></div>

            <label class="block text-xs font-bold text-slate-500 mb-1">LÝ DO XIN NGHỈ</label>
            <input type="text" id="reason" class="w-full border p-2 mb-4 rounded">
            
            <button onclick="saveLeave()" class="w-full bg-green-600 text-white py-2 rounded font-bold hover:bg-green-700">LƯU / CẬP NHẬT ĐƠN</button>
        </div>

        <div class="col-span-8 bg-white p-6 rounded-xl shadow border">
            <table class="w-full text-sm data-table">
                <thead>
                    <tr class="bg-slate-100">
                        <th>Họ Tên</th><th>SĐT</th><th>Thời gian nghỉ</th><th>Công ĐM</th><th>Đã nghỉ</th><th>Công thực tế</th><th>Còn lại</th><th>Trạng thái</th><th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="mainBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const client = supabase.createClient("https://qztflyvraluxtpzbmtgp.supabase.co", "sb_publishable_MHTau0ZEnlDWdyfwfQZE-A_LAdOTm-B");
        const PHEP_LUAT = 12;
        let isAuthenticated = false;

        function handleAuth(e) {
            if (e.key === 'Enter') {
                if(document.getElementById('qtvPass').value === "123456") {
                    isAuthenticated = true;
                    alert("✅ Xác thực thành công! Bạn có toàn quyền thao tác.");
                } else {
                    isAuthenticated = false;
                    alert("❌ Sai mật mã quản trị!");
                }
            }
        }

        function autoCalcDays() {
            const start = new Date(document.getElementById('dateStart').value);
            const end = new Date(document.getElementById('dateEnd').value);
            const days = Math.ceil((end - start)/(1000*60*60*24) + 1);
            document.getElementById('daysCount').value = (days > 0) ? days : 0;
        }

        async function saveLeave() {
            if(!isAuthenticated) { alert("Vui lòng nhập mật khẩu QTV & Enter!"); return; }
            const name = document.getElementById('empSelect').value;
            const base_work = parseInt(document.getElementById('baseWork').value);
            const phone = document.getElementById('phone').value;
            const start = document.getElementById('dateStart').value;
            const end = document.getElementById('dateEnd').value;
            const reason = document.getElementById('reason').value;
            const days = parseInt(document.getElementById('daysCount').value);
            
            await client.from('employees_list').upsert({name, base_work, phone});
            const { data } = await client.from('leave_records').select('id').eq('name', name).single();
            if (data) await client.from('leave_records').update({start, end, days, reason}).eq('id', data.id);
            else await client.from('leave_records').insert({name, start, end, days, reason});
            refresh();
        }

        async function refresh() {
            const { data: emps } = await client.from('employees_list').select('*');
            const { data: leaves } = await client.from('leave_records').select('*');
            
            document.getElementById('empSelect').innerHTML = emps.map(e => `<option value="${e.name}">${e.name}</option>`).join('');
            
            document.getElementById('mainBody').innerHTML = emps.map(e => {
                const l = leaves.find(x => x.name === e.name) || {days: 0, start: '', end: '', reason: ''};
                const congDM = e.base_work || 22;
                const daNghi = l.days || 0;
                const conLai = PHEP_LUAT - daNghi;
                let status = conLai <= 0 ? "Hết phép" : (conLai <= 3 ? "Sắp hết phép" : "Còn phép");

                return `<tr>
                    <td>${e.name}</td><td>${e.phone || ''}</td>
                    <td>${l.start ? l.start + ' đến ' + l.end : ''}</td>
                    <td>${congDM}</td><td>${daNghi}</td><td>${congDM - daNghi}</td>
                    <td class="font-bold">${conLai}</td>
                    <td class="${conLai <= 0 ? 'text-red-600' : 'text-green-600'} font-bold">${status}</td>
                    <td>
                        <button onclick="fillEdit('${e.name}', ${congDM}, '${e.phone || ''}', '${l.start}', '${l.end}', '${l.reason}')" class="text-blue-600 font-bold">Sửa</button>
                        <button onclick="delRecord('${e.name}')" class="text-red-600 ml-2 font-bold">Xóa</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function fillEdit(name, dm, phone, start, end, reason) {
            if(!isAuthenticated) { alert("Vui lòng xác thực QTV trước!"); return; }
            document.getElementById('empSelect').value = name;
            document.getElementById('baseWork').value = dm;
            document.getElementById('phone').value = phone;
            document.getElementById('dateStart').value = start;
            document.getElementById('dateEnd').value = end;
            document.getElementById('reason').value = reason;
            autoCalcDays();
        }

        async function delRecord(name) {
            if(!isAuthenticated) { alert("Vui lòng xác thực QTV trước!"); return; }
            await client.from('leave_records').delete().eq('name', name);
            refresh();
        }

        async function importExcel(e) { /* Logic xử lý Excel của bạn */ refresh(); }
        window.onload = refresh;
    </script>
</body>
</html>
